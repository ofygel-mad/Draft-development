version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    working_dir: /app/apps/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - .:/app
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    working_dir: /app/apps/api
    command: >
      sh -c "
        sh /app/infra/scripts/wait-for-db.sh &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput --clear &&
        gunicorn config.wsgi:application
          --bind 0.0.0.0:8000
          --workers ${GUNICORN_WORKERS:-4}
          --worker-class sync
          --timeout 120
          --access-logfile -
          --error-logfile -
      "
    volumes:
      - .:/app
      - static_volume:/app/apps/api/staticfiles
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    working_dir: /app/apps/api
    command: >
      sh -c "
        sh /app/infra/scripts/wait-for-db.sh &&
        celery -A config worker
          -l info
          -Q default,imports,exports,automations,notifications
          --concurrency=${CELERY_CONCURRENCY:-4}
          --max-tasks-per-child=1000
      "
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  beat:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    working_dir: /app/apps/api
    command: >
      sh -c "
        sh /app/infra/scripts/wait-for-db.sh &&
        celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
      "
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_volume:
