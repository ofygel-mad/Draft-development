[build]
builder = "nixpacks"

[deploy]
startCommand = "cd apps/api && python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --worker-class gevent --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/health/"
timeout = 30
